<div class="page-container" [class.p-0]="isModal" [class.bg-transparent]="isModal">
  <header *ngIf="!isModal" class="form-header-premium rounded-t-2xl">
    <div class="flex items-center gap-4">
      <button [routerLink]="isModal ? null : '/admin/reservas'" (click)="isModal ? onCancel.emit() : null" class="w-10 h-10 rounded-full bg-white border border-slate-200 text-slate-500 hover:text-slate-800 hover:bg-slate-50 flex items-center justify-center transition-all shadow-sm">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <div>
        <h1 class="text-2xl md:text-3xl font-black text-slate-900 tracking-tight">
          {{ isEditMode ? 'Editar Reserva' : 'Nueva Reserva' }}
        </h1>
        <p class="text-sm font-bold text-slate-500 uppercase tracking-widest">Sistema de Gestión Chifa Linda</p>
      </div>
    </div>
  </header>

  <div class="form-card" [class.rounded-t-none]="!isModal">
    <form [formGroup]="reservaForm" (ngSubmit)="onSubmit()" class="p-8">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        
        <!-- Cliente -->
        <div class="form-row">
          <label class="form-label">Cliente (Nombre completo) <span class="required">*</span></label>
          <input type="text" formControlName="nombreCliente" class="form-input" placeholder="Ej: Juan Perez">
          <p *ngIf="reservaForm.get('nombreCliente')?.touched && reservaForm.get('nombreCliente')?.invalid" class="form-error">
            El nombre es obligatorio.
          </p>
        </div>

        <!-- Teléfono -->
        <div class="form-row">
          <label class="form-label">Tel&eacute;fono <span class="required">*</span></label>
          <input type="text" formControlName="telefonoCliente" class="form-input" placeholder="Ej: 987654321">
        </div>

        <!-- DNI -->
        <div class="form-row">
          <label class="form-label">DNI del Cliente</label>
          <input type="text" formControlName="dniCliente" class="form-input" placeholder="DNI">
        </div>

        <!-- Cantidad Personas -->
        <div class="form-row">
          <label class="form-label">Cantidad de Personas <span class="required">*</span></label>
          <input type="number" formControlName="cantidadPersonas" class="form-input" placeholder="Ej: 4">
        </div>

        <!-- Mesa Asignada -->
        <div class="form-row">
          <label class="form-label">Mesa Asignada</label>
          <select formControlName="idMesa" class="form-input">
            <option [ngValue]="null">Por asignar</option>
            <option *ngFor="let m of mesas" [value]="m.idMesa || m.id">
              Mesa {{m.numeroMesa || m.numero}} (Cap: {{m.capacidad}})
            </option>
          </select>
        </div>

        <!-- Fecha y Hora -->
        <div class="form-row">
          <label class="form-label">Fecha y Hora <span class="required">*</span></label>
          <input type="datetime-local" formControlName="fechaHoraReserva" class="form-input">
        </div>

        <!-- Estado -->
        <div class="form-row" *ngIf="isEditMode">
          <label class="form-label">Estado de Reserva</label>
          <select formControlName="estado" class="form-input">
            <option value="PENDIENTE">PENDIENTE</option>
            <option value="CONFIRMADA">CONFIRMADA</option>
            <option value="CANCELADA">CANCELADA</option>
            <option value="COMPLETADA">COMPLETADA</option>
          </select>
        </div>

        <!-- Observaciones -->
        <div class="form-row md:col-span-2">
          <label class="form-label">Observaciones</label>
          <textarea formControlName="observaciones" rows="3" class="form-input" placeholder="Alguna indicaci&oacute;n especial..."></textarea>
        </div>
      </div>

      <!-- Footer Buttons -->
      <div class="flex items-center justify-end gap-3 pt-6 border-t border-slate-100">
        <button type="button" (click)="isModal ? onCancel.emit() : null" [routerLink]="isModal ? null : '/admin/reservas'"
                class="btn-premium-cancel">
          Cancelar
        </button>
        <button type="submit" [disabled]="reservaForm.invalid || submitting"
                class="btn-premium-save">
          <span *ngIf="submitting" class="spinner-border spinner-border-sm" role="status"></span>
          <svg *ngIf="!submitting" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          {{ isEditMode ? 'Guardar Cambios' : 'Confirmar Reserva' }}
        </button>
      </div>
    </form>
  </div>
</div>
