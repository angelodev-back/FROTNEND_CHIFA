<div class="admin-page anime-fade-in">
  <!-- Premium Header -->
  <div class="admin-page-header">
    <div class="aph-left">
      <div class="aph-icon" style="background: linear-gradient(135deg, #4f46e5, #4338ca);">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div>
        <h1 class="aph-title">Registrar y Reservar</h1>
        <p class="aph-sub">Creación automática de cuenta de cliente y asignación de mesa</p>
      </div>
    </div>
  </div>

  <div class="form-container-premium animate-fade-in">
    <form #f="ngForm" class="reserva-form-grid">
       <!-- Fila de Identidad -->
       <div class="form-group">
          <label class="form-label">Nombre del Cliente</label>
          <input type="text" class="form-control" name="nombre" [(ngModel)]="model.nombreCliente" required placeholder="Ej. Juan">
       </div>

       <div class="form-group">
          <label class="form-label">Apellido del Cliente</label>
          <input type="text" class="form-control" name="apellido" [(ngModel)]="model.apellidoCliente" required placeholder="Ej. Pérez">
       </div>
       
       <!-- Fila de Contacto -->
       <div class="form-group">
          <label class="form-label">Email del Cliente</label>
          <input type="email" class="form-control" name="email" [(ngModel)]="model.emailCliente" required placeholder="usuario@correo.com">
       </div>

       <div class="form-group">
          <label class="form-label">Teléfono / Celular</label>
          <input type="text" class="form-control" name="telefono" [(ngModel)]="model.telefonoCliente" required placeholder="Ej. 9XXXXXXXX">
       </div>

       <!-- Fila de Identificación -->
       <div class="form-group full-width">
          <label class="form-label">DNI / Pasaporte (Se usará como contraseña)</label>
          <input type="text" class="form-control" name="dni" [(ngModel)]="model.dniCliente" required placeholder="Documento obligatorio">
       </div>

       <!-- Fila de Mesa -->
       <div class="form-group full-width">
          <label class="form-label">Asignar Mesa Exclusiva</label>
          <select class="form-control" name="mesa" [(ngModel)]="model.idMesa" (change)="onMesaChange(model.idMesa)" required>
             <option [ngValue]="null" disabled selected>-- Seleccione una mesa --</option>
             <option *ngFor="let m of mesasDisponibles()" [value]="m.idMesa">Mesa {{ m.numero || m.numeroMesa }} (Capacidad: {{ m.capacidad }})</option>
             <option *ngIf="mesasDisponibles().length === 0" disabled>No hay mesas disponibles en este momento</option>
          </select>
       </div>

       <div class="form-actions-full full-width">
          <button type="button" class="btn-reserva btn-primary-premium" [disabled]="!f.valid" (click)="guardar()">
             Registrar Cliente y Crear Reserva
          </button>
          <button type="button" class="btn-reserva btn-outline-premium" routerLink="/recepcion/reservas">
             Volver al Listado
          </button>
       </div>
    </form>
  </div>
</div>
