<!-- Persistent Server Status Modal -->
<div *ngIf="statusService.isOffline()" class="server-offline-overlay anim-fade-in">
  <div class="server-offline-modal anim-scale-up">
    <div class="modal-status-icon">
      <div class="pulse-ring"></div>
      <span class="icon-main">⚠️</span>
    </div>
    <h2 class="modal-status-title">Conexión Perdida</h2>
    <p class="modal-status-text">
        No pudimos contactar con el servidor. Por favor, verifica tu conexión a internet o asegúrate de que el backend esté encendido.
    </p>
    <div class="modal-status-footer">
        <div class="loading-dots">
            <span></span><span></span><span></span>
        </div>
        <span class="reconnect-text">Reintentando conectar automáticamente...</span>
    </div>
  </div>
</div>

<app-navbar *ngIf="authService.isAuthenticated() && authService.getNormalizedRole() !== 'CLIENTE'"></app-navbar>

<!-- Global Notification Hub -->
<div class="global-notification-hub">
  <div *ngFor="let toast of toastService.toasts()" 
       class="premium-toast anime-slide-right" 
       [ngClass]="'toast-' + toast.type"
       (click)="toastService.remove(toast.id)">
    <div class="toast-visual-indicator">
      <span *ngIf="toast.type === 'success'">✅</span>
      <span *ngIf="toast.type === 'error'">❌</span>
      <span *ngIf="toast.type === 'warning'">⚠️</span>
      <span *ngIf="toast.type === 'info'">ℹ️</span>
    </div>
    <div class="toast-content">
      <p class="toast-message">{{ toast.message }}</p>
    </div>
    <div class="toast-progress-bar"></div>
  </div>
</div>

<!-- Global Liquid Loading Interface -->
<div *ngIf="loadingService.isLoading()" class="liquid-loader-canvas">
  <div class="loader-portal">
    <div class="loader-liquid"></div>
    <span class="loader-brand">CHIFA LINDA</span>
  </div>
</div>

<main [class.main-container]="authService.isAuthenticated()">
  <router-outlet></router-outlet>
</main>
