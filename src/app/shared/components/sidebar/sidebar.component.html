<aside class="sidebar" role="navigation" aria-label="Menú principal">

  <!-- LOGO / BRAND -->
  <div class="sidebar-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ef4444" />
            <stop offset="100%" stop-color="#b91c1c" />
          </linearGradient>
          <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
          </filter>
        </defs>
        <circle cx="16" cy="16" r="16" fill="url(#brandGrad)"/>
        <path d="M8 20 C8 15, 12 9, 16 9 C20 9, 24 15, 24 20" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" filter="url(#glow)"/>
        <path d="M11 20 C11 17, 13.5 14, 16 14 C18.5 14, 21 17, 21 20" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <circle cx="16" cy="20" r="2" fill="white"/>
        <rect x="9" y="23" width="14" height="2" rx="1" fill="white" opacity="0.9"/>
      </svg>
    </div>
    <div class="brand-text">
      <span class="brand-name">Chifa Linda</span>
      <span class="brand-subtitle">Gestión</span>
    </div>
  </div>

  <!-- MENU GROUPS -->
  <nav class="sidebar-nav">
    <div class="menu-group" *ngFor="let group of menuGroups">
      <span class="group-label" *ngIf="group.groupLabel">{{ group.groupLabel }}</span>
      <ul class="menu-list" role="list">
        <li *ngFor="let item of group.items">
          <a
            class="menu-item"
            [class.active]="activeMenu === item.label"
            (click)="selectMenu(item)"
            [routerLink]="item.route"
            role="menuitem"
            [attr.aria-current]="activeMenu === item.label ? 'page' : null"
          >
            <!-- Íconos SVG inline por nombre -->
            <span class="menu-icon" [innerHTML]="''" aria-hidden="true">
              <ng-container [ngSwitch]="item.icon">
                <svg *ngSwitchCase="'home'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <svg *ngSwitchCase="'bar-chart'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
                <svg *ngSwitchCase="'grid'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                <svg *ngSwitchCase="'shopping-bag'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                <svg *ngSwitchCase="'book-open'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                <svg *ngSwitchCase="'calendar'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <svg *ngSwitchCase="'users'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <svg *ngSwitchCase="'shield'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                <svg *ngSwitchCase="'dollar-sign'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                <svg *ngSwitchCase="'bell'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <svg *ngSwitchCase="'activity'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <svg *ngSwitchCase="'clock'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <svg *ngSwitchCase="'zap'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                <svg *ngSwitchCase="'check-circle'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <svg *ngSwitchCase="'shopping-cart'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                <svg *ngSwitchCase="'package'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.89 2.18c-.55-.24-1.23-.24-1.78 0l-8.5 3.7c-.38.17-.61.55-.61.96v7.72c0 .3.17.58.44.71l8.5 4.31c.21.1.44.15.68.15.24 0 .47-.05.68-.15l8.5-4.31c.27-.14.44-.42.44-.71l-.01-7.72c0-.41-.23-.79-.61-.96l-8.49-3.7z"/><path d="m3.61 6.84 8.39 3.65 8.39-3.65"/><path d="M12 21.16v-10.37"/></svg>
                <svg *ngSwitchCase="'tag'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                <svg *ngSwitchCase="'settings'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 00 1.82.33 1.65 1.65 0 00 1-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 00 1 1.51 1.65 1.65 0 00 1.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82 1.65 1.65 0 00 1.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                <!-- default -->
                <svg *ngSwitchDefault viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
              </ng-container>
            </span>
            <span class="menu-label">{{ item.label }}</span>

            <!-- Badge notif -->
            <span *ngIf="item.badge === 'live'" class="badge-live">
              <ng-container *ngIf="(contadorNotificaciones$ | async) as count">
                <span *ngIf="count > 0" class="notif-count">{{ count }}</span>
              </ng-container>
            </span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- USER INFO + LOGOUT -->
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" [style.background-color]="getRoleColor()">
        {{ userName.charAt(0).toUpperCase() }}
      </div>
      <div class="user-details">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role">{{ getRoleLabel() }}</span>
      </div>
    </div>
    <button class="btn-logout" (click)="logout()" aria-label="Cerrar sesión" title="Cerrar sesión">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</aside>
